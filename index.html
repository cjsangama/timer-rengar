<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Timer Gym LoL</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
overflow:hidden;
}

/* FONDOS */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
z-index:-1;
opacity:0.35;
}

/* TEXTO */

#fase{
font-size:5vw;
margin-bottom:10px;
}

#timer{
font-size:18vw;
font-weight:bold;
}

/* BOTON */

button{
margin-top:40px;
font-size:2vw;
padding:15px 40px;
border:none;
border-radius:10px;
background:#ff4444;
color:white;
cursor:pointer;
}

button:hover{
background:#ff2222;
}

.work{
color:#ff3b3b;
}

.rest{
color:#4ecbff;
}

</style>
</head>

<body>

<div id="gifTrabajo" class="bg"></div>
<div id="gifDescanso" class="bg" style="display:none;"></div>

<div id="fase" class="work">TRABAJO</div>
<div id="timer">01:00</div>

<button onclick="iniciar()">INICIAR</button>

<!-- SONIDOS -->

<audio id="rengarSound" src="rengar.mp3"></audio>
<audio id="tahmSound" src="tahmkench.mp3"></audio>

<script>

let trabajo = 60;
let descanso = 30;

let tiempo = trabajo;
let trabajando = true;
let intervalo;

const timer = document.getElementById("timer");
const fase = document.getElementById("fase");

const gifTrabajo = document.getElementById("gifTrabajo");
const gifDescanso = document.getElementById("gifDescanso");

const rengarSound = document.getElementById("rengarSound");
const tahmSound = document.getElementById("tahmSound");

/* FONDOS */

gifTrabajo.style.backgroundImage = "url('rengar.gif')";
gifDescanso.style.backgroundImage = "url('tahmkench.gif')";

function formatear(t){
let m = Math.floor(t/60);
let s = t%60;
return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function beep(){

const ctx = new (window.AudioContext || window.webkitAudioContext)();
const osc = ctx.createOscillator();
const gain = ctx.createGain();

osc.connect(gain);
gain.connect(ctx.destination);

osc.frequency.value = 900;

osc.start();

gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.2);

}

function iniciar(){

clearInterval(intervalo);

/* RUGIDO AL EMPEZAR */

rengarSound.currentTime = 0;
rengarSound.play();

intervalo = setInterval(()=>{

tiempo--;

if(tiempo<=3 && tiempo>0){
beep();
}

if(tiempo<=0){

if(trabajando){

trabajando=false;
tiempo=descanso;

fase.textContent="DESCANSO";
fase.className="rest";

/* VOZ DE TAHM KENCH */

tahmSound.currentTime = 0;
tahmSound.play();

gifTrabajo.style.display="none";
gifDescanso.style.display="block";

}else{

trabajando=true;
tiempo=trabajo;

fase.textContent="TRABAJO";
fase.className="work";

/* RUGIDO DE RENGAR */

rengarSound.currentTime = 0;
rengarSound.play();

gifTrabajo.style.display="block";
gifDescanso.style.display="none";

}

}

timer.textContent = formatear(tiempo);

},1000);

}

</script>

</body>
</html>
