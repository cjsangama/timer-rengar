<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Timer Gym LoL</title>

<!-- FUENTE ROCK -->
<link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:'RocknRoll One', sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
overflow:hidden;
}

/* PANEL CONFIG */

.config{
position:absolute;
top:20px;
display:flex;
gap:20px;
align-items:center;
background:rgba(0,0,0,0.6);
padding:15px 25px;
border-radius:10px;
}

.config input{
width:60px;
padding:5px;
font-size:16px;
text-align:center;
}

.config button{
padding:8px 20px;
font-size:16px;
cursor:pointer;
background:#ff4444;
border:none;
color:white;
border-radius:6px;
}

/* FONDO */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
z-index:-1;
opacity:0.35;
}

/* TEXTO */

#fase{
font-size:5vw;
}

#set{
font-size:2vw;
margin-bottom:10px;
}

#timer{
font-size:18vw;
font-weight:bold;
}

.work{
color:#ff3b3b;
}

.rest{
color:#4ecbff;
}

</style>
</head>

<body>

<div class="config">

<label>Series
<input id="setsInput" type="number" value="4">
</label>

<label>Trabajo
<input id="workInput" type="number" value="60">
</label>

<label>Descanso
<input id="restInput" type="number" value="30">
</label>

<button onclick="iniciar()">INICIAR</button>

</div>

<div id="gifTrabajo" class="bg"></div>
<div id="gifDescanso" class="bg" style="display:none;"></div>

<div id="set">SET 1</div>
<div id="fase" class="work">TRABAJO</div>
<div id="timer">01:00</div>

<audio id="rengarSound" src="rengar.mp3"></audio>
<audio id="tahmSound" src="tahmkench.mp3"></audio>

<script>

let trabajo;
let descanso;
let sets;

let setActual = 1;
let tiempo;
let trabajando = true;
let intervalo;

const timer = document.getElementById("timer");
const fase = document.getElementById("fase");
const setText = document.getElementById("set");

const gifTrabajo = document.getElementById("gifTrabajo");
const gifDescanso = document.getElementById("gifDescanso");

const rengarSound = document.getElementById("rengarSound");
const tahmSound = document.getElementById("tahmSound");

/* FONDOS */

gifTrabajo.style.backgroundImage = "url('rengar.gif')";
gifDescanso.style.backgroundImage = "url('tahmkench.gif')";

function formatear(t){
let m = Math.floor(t/60);
let s = t%60;
return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function beep(){

const ctx = new (window.AudioContext || window.webkitAudioContext)();
const osc = ctx.createOscillator();
const gain = ctx.createGain();

osc.connect(gain);
gain.connect(ctx.destination);

osc.frequency.value = 900;

osc.start();

gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.2);

}

function iniciar(){

clearInterval(intervalo);

/* LEER CONFIG */

sets = parseInt(document.getElementById("setsInput").value);
trabajo = parseInt(document.getElementById("workInput").value);
descanso = parseInt(document.getElementById("restInput").value);

setActual = 1;
tiempo = trabajo;
trabajando = true;

setText.textContent = "SET " + setActual + " / " + sets;

/* RUGIDO INICIAL */

rengarSound.currentTime = 0;
rengarSound.play();

intervalo = setInterval(()=>{

tiempo--;

if(tiempo<=3 && tiempo>0){
beep();
}

if(tiempo<=0){

if(trabajando){

trabajando=false;
tiempo=descanso;

fase.textContent="DESCANSO";
fase.className="rest";

tahmSound.currentTime = 0;
tahmSound.play();

gifTrabajo.style.display="none";
gifDescanso.style.display="block";

}else{

setActual++;

if(setActual>sets){
clearInterval(intervalo);
fase.textContent="FIN";
timer.textContent="00:00";
return;
}

trabajando=true;
tiempo=trabajo;

setText.textContent="SET " + setActual + " / " + sets;

fase.textContent="TRABAJO";
fase.className="work";

rengarSound.currentTime = 0;
rengarSound.play();

gifTrabajo.style.display="block";
gifDescanso.style.display="none";

}

}

timer.textContent = formatear(tiempo);

},1000);

}

</script>

</body>
</html>
